name: Validate Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SKILL.md files
        run: |
          errors=0
          for dir in skills/*/; do
            skill_file="$dir/SKILL.md"
            if [ ! -f "$skill_file" ]; then
              echo "❌ Missing SKILL.md in $dir"
              errors=$((errors + 1))
              continue
            fi
            name=$(basename "$dir")
            # Check frontmatter
            if ! head -20 "$skill_file" | grep -q "^name:"; then
              echo "❌ $skill_file missing 'name:' in frontmatter"
              errors=$((errors + 1))
            fi
            if ! head -20 "$skill_file" | grep -q "^description:"; then
              echo "❌ $skill_file missing 'description:' in frontmatter"
              errors=$((errors + 1))
            fi
            # Check name matches directory
            fm_name=$(grep "^name:" "$skill_file" | head -1 | sed 's/^name: *//')
            if [ "$fm_name" != "$name" ]; then
              echo "❌ $skill_file: name '$fm_name' doesn't match directory '$name'"
              errors=$((errors + 1))
            fi
            echo "✓ $skill_file"
          done
          if [ $errors -gt 0 ]; then
            echo "Found $errors error(s)"
            exit 1
          fi

      - name: Validate scripts
        run: |
          find skills -name "*.sh" -type f | while read script; do
            bash -n "$script" && echo "✓ $script" || exit 1
          done
